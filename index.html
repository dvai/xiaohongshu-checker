<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小红书违规词检测工具</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Xiaohongshu Compliance Checker</p>
          <h1>小红书违规词检测工具</h1>
          <p class="hero-text">
            粘贴正文，快速查看风险词、高亮命中和润色结果。
          </p>
          <div class="hero-meta" id="heroMeta"></div>
        </div>
        <div class="hero-panel">
          <div class="status-card">
            <span class="status-label">当前词库版本</span>
            <strong id="bankVersion">-</strong>
          </div>
          <div class="status-card">
            <span class="status-label">规则总数</span>
            <strong id="ruleCount">-</strong>
          </div>
        </div>
      </section>

      <section class="compare-workspace">
        <div class="panel input-panel">
          <div class="panel-header">
            <div>
              <h2>正文输入</h2>
              <p>支持正文、标题草稿、评论回复。</p>
            </div>
            <div class="actions">
              <button type="button" class="ghost" id="fillExample">示例内容</button>
              <button type="button" class="ghost" id="clearText">清空</button>
              <button type="button" class="ghost" id="runPolish">一键润色</button>
              <button type="button" class="primary" id="runCheck">开始检测</button>
            </div>
          </div>

          <label class="field">
            <span>正文内容</span>
            <textarea
              id="contentInput"
              placeholder="把你准备发布的小红书正文粘贴到这里..."
            ></textarea>
          </label>

          <div class="panel-footer">
            <span id="textCounter">0 字</span>
            <span>检测逻辑包含关键词命中、变体写法、正则规则和自定义词库。</span>
          </div>
        </div>

        <div class="panel result-panel">
          <div class="panel-header compact">
            <div>
              <h2>高亮预览</h2>
              <p>右侧即时查看命中内容。</p>
            </div>
          </div>
          <div class="highlight-box" id="highlightBox">
            暂无内容，请先输入正文并点击“开始检测”。
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="sidebar">
          <div class="panel summary-panel">
            <div class="panel-header compact">
              <div>
                <h2>检测概览</h2>
                <p>先看风险，再逐项处理。</p>
              </div>
            </div>
            <div class="summary-grid" id="summaryGrid"></div>
          </div>

          <div class="panel custom-panel">
            <div class="panel-header compact">
              <div>
                <h2>自定义词库</h2>
                <p>每行一个词，自动本地保存。</p>
              </div>
              <button type="button" class="ghost" id="saveCustomWords">保存</button>
            </div>
            <label class="field">
              <span>补充你的专属敏感词</span>
              <textarea
                id="customWords"
                class="small-textarea"
                placeholder="比如：私域成交&#10;返点合作&#10;返图返佣"
              ></textarea>
            </label>
            <p class="hint" id="customHint">未保存</p>
          </div>
        </aside>

        <section class="results">
          <div class="result-switcher" id="resultSwitcher">
            <button type="button" class="switcher-btn active" data-view="detail">命中详情</button>
            <button type="button" class="switcher-btn" data-view="polish">自动润色</button>
          </div>

          <div class="panel detail-panel" data-panel="detail">
            <div class="panel-header compact">
              <div>
                <h2>命中详情</h2>
                <p>按风险等级和分类展示。</p>
              </div>
              <button type="button" class="ghost" id="copyHits">复制命中词</button>
            </div>
            <div class="detail-list" id="detailList">
              <div class="empty-state">还没有检测结果。</div>
            </div>
          </div>

          <div class="panel polish-panel is-hidden" data-panel="polish">
            <div class="panel-header compact">
              <div>
                <h2>自动润色</h2>
                <p>生成一版更稳妥的草稿。</p>
              </div>
              <button type="button" class="ghost" id="copyPolished">复制润色稿</button>
            </div>
            <div class="rewrite-meta" id="rewriteMeta">还没有生成润色稿。</div>
            <div class="polish-box" id="polishBox">暂无内容。</div>
          </div>
        </section>
      </section>
    </main>

    <script src="./wordbank.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
