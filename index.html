<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小红书违规词检测工具</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="topbar-main">
          <p class="eyebrow">Compliance Workspace</p>
          <h1>小红书违规词检测</h1>
          <p class="topbar-text">输入正文，右侧即时查看高亮命中，下方查看分类详情。</p>
        </div>
        <div class="topbar-stats">
          <div class="stat-card">
            <span>词库版本</span>
            <strong id="bankVersion">-</strong>
          </div>
          <div class="stat-card">
            <span>规则总数</span>
            <strong id="ruleCount">-</strong>
          </div>
        </div>
      </header>

      <section class="meta-row" id="heroMeta"></section>

      <section class="compare-workspace">
        <div class="panel input-panel">
          <div class="panel-header">
            <div>
              <h2>正文输入</h2>
              <p>支持正文、标题草稿、评论回复。</p>
            </div>
            <div class="actions">
              <button type="button" class="button secondary" id="fillExample">示例内容</button>
              <button type="button" class="button secondary" id="clearText">清空</button>
              <button type="button" class="button primary" id="runCheck">立即检测</button>
            </div>
          </div>

          <label class="field">
            <span>正文内容</span>
            <textarea
              id="contentInput"
              placeholder="把你准备发布的小红书正文粘贴到这里..."
            ></textarea>
          </label>

          <div class="panel-footer">
            <span id="textCounter">0 字</span>
            <span>输入后会自动刷新检测结果。</span>
          </div>
        </div>

        <div class="panel result-panel">
          <div class="panel-header">
            <div>
              <h2>高亮预览</h2>
              <p>与左侧正文滚动同步，方便逐段对照。</p>
            </div>
          </div>
          <div class="highlight-box" id="highlightBox">
            暂无内容，请先输入正文并点击“立即检测”。
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="sidebar">
          <div class="panel summary-panel">
            <div class="panel-header compact">
              <div>
                <h2>检测概览</h2>
                <p>先看整体风险，再处理命中项。</p>
              </div>
            </div>
            <div class="summary-grid" id="summaryGrid"></div>
          </div>

          <div class="panel custom-panel">
            <div class="panel-header compact">
              <div>
                <h2>自定义词库</h2>
                <p>每行一个词，自动保存在本地。</p>
              </div>
              <button type="button" class="button secondary" id="saveCustomWords">保存</button>
            </div>
            <label class="field">
              <span>补充你的专属敏感词</span>
              <textarea
                id="customWords"
                class="small-textarea"
                placeholder="比如：私域成交&#10;返点合作&#10;返图返佣"
              ></textarea>
            </label>
            <p class="hint" id="customHint">未保存</p>
          </div>
        </aside>

        <section class="results">
          <div class="panel detail-panel">
            <div class="panel-header compact">
              <div>
                <h2>命中详情</h2>
                <p>按风险等级和分类展示。</p>
              </div>
              <button type="button" class="button secondary" id="copyHits">复制命中词</button>
            </div>
            <div class="detail-list" id="detailList">
              <div class="empty-state">还没有检测结果。</div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="./wordbank.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
